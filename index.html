<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz igra</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.game {
  position: relative;
  width: min(100vw, calc(100dvh * 9 / 16));
  height: min(100dvh, calc(100vw * 16 / 9));
  aspect-ratio: 9 / 16;
  background: url("pozadina.png") center/100% 100% no-repeat;
  overflow: hidden;
}

/* GORNJI BROJEVI */
.round-numbers {
  position: absolute;
  top: 6.8%;
  left: 50%;
  transform: translateX(-50%);
  width: 76%;
  display: flex;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0.7%;
  overflow: hidden;
}

.round-numbers button {
  aspect-ratio: 1 / 1;
  flex: 1 1 auto;
  max-width: 9%;
  padding: 0;
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: white;
  border: 1.5px solid white;
  border-radius: 6px;
  box-sizing: border-box;
}

/* COUNTER */
.counter {
  position: absolute;
  top: 31.2%;
  left: 50%;
  transform: translate(-50%, -50%);
  min-width: 20%;
  min-height: 6.2%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(42px, 6.5vw, 78px);
  font-weight: 900;
  color: white;
  line-height: 1;
  padding: 1.2% 2.5%;
  cursor: pointer;
  text-shadow:
    0 0 8px rgba(255,255,255,0.95),
    0 0 18px rgba(80,160,255,0.95),
    0 0 34px rgba(30,94,255,1);
}

/* IGRAČI */
.player {
  position: absolute;
  top: 53.8%;
  transform: translateX(-50%);
  min-width: 19%;
  min-height: 4.4%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 3.1vw, 30px);
  font-weight: bold;
  background: #1e5eff;
  border: 2px solid white;
  border-radius: 10px;
  padding: 0.8% 1.5%;
  box-shadow:
    0 0 6px rgba(255,255,255,0.55),
    0 0 16px rgba(30,94,255,0.9);
}

/* mali pomaci */
#p1 { left: 21.6%; }
#p2 { left: 50%; }
#p3 { left: 78.4%; }

/* PITANJE */
.question-box {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 25.2%;
  box-sizing: border-box;
  background: rgba(30, 94, 255, 0.72);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 3.2% 4% 3.5%;
  text-align: center;
  box-shadow:
    0 0 18px rgba(30,94,255,0.65),
    inset 0 0 18px rgba(255,255,255,0.08);
}

/* PITANJE TEXT */
.question-box h2 {
  margin: 0 0 3.2% 0;
  font-size: clamp(24px, 4.2vw, 42px);
  color: white;
  text-shadow: 0 0 8px rgba(255,255,255,0.35);
}

/* ODGOVORI */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8% 14%;
  margin-top: 1%;
}

.answers button {
  padding: 0.9em 0.6em;
  font-size: clamp(15px, 2.2vw, 18px);
  background: #1e5eff;
  color: white;
  border: 2px solid white;
  border-radius: 10px;
  box-shadow:
    0 0 6px rgba(255,255,255,0.45),
    0 0 14px rgba(30,94,255,0.85);
}
</style>
</head>

<body>

<div class="game">

  <div class="round-numbers" id="numbers"></div>

  <div class="counter" id="counter">-</div>

  <div id="p1" class="player">0</div>
  <div id="p2" class="player">0</div>
  <div id="p3" class="player">0</div>

  <div class="question-box" id="qbox" style="display:none;">
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
  </div>

</div>

<script>
let players = [0, 0, 0];
let round = 1;
let used = new Set();
let currentNumber = null;
let running = false;
let currentTurnIndex = 0;
let currentPlayer = 0;
let questionOpen = false;

const counter = document.getElementById("counter");

const baseTurnPatterns = [
  [0, 1, 2], // 1,4,7
  [1, 2, 0], // 2,5,8
  [2, 0, 1]  // 3,6,9
];

function generateQuestion(n){
  let a = Math.floor(Math.random() * n);
  return {
    question:`Koliko je ${a} + ${n-a}?`,
    answers:[
      a + (n-a),
      a + (n-a) + 1,
      a + (n-a) - 1,
      a + (n-a) + 2
    ],
    correct:0
  }
}

function getRoundRange() {
  return {
    start: (round - 1) * 10 + 1,
    end: round * 10
  };
}

function getTurnOrder() {
  if (round < 10) {
    return baseTurnPatterns[(round - 1) % 3];
  }

  return [0, 1, 2]
    .map(index => ({ index, score: players[index] }))
    .sort((a, b) => {
      if (a.score !== b.score) return a.score - b.score;
      return a.index - b.index;
    })
    .map(item => item.index);
}

function setCurrentPlayer() {
  currentPlayer = getTurnOrder()[currentTurnIndex];
}

function drawNumbers() {
  let div = document.getElementById("numbers");
  div.innerHTML = "";

  let { start, end } = getRoundRange();

  for (let i = start; i <= end; i++) {
    if (!used.has(i)) {
      let b = document.createElement("button");
      b.innerText = i;
      b.type = "button";
      b.disabled = true;
      div.appendChild(b);
    }
  }
}

function getAvailableNumbers() {
  let { start, end } = getRoundRange();
  let nums = [];

  for (let i = start; i <= end; i++) {
    if (!used.has(i)) nums.push(i);
  }

  return nums;
}

let interval;

function stopCounter() {
  running = false;
  clearInterval(interval);
}

function startCounter() {
  stopCounter();

  let nums = getAvailableNumbers();
  if (nums.length === 0) return;

  running = true;

  interval = setInterval(() => {
    let available = getAvailableNumbers();
    if (available.length === 0) {
      stopCounter();
      return;
    }

    let r = available[Math.floor(Math.random() * available.length)];
    currentNumber = r;
    counter.innerText = r;
  }, 50);
}

counter.onclick = () => {
  if (!running || questionOpen) return;
  if (currentNumber === null) return;

  stopCounter();
  startQuestion(currentNumber);
};

function startQuestion(num) {
  if (questionOpen) return;

  used.add(num);
  drawNumbers();
  questionOpen = true;

  let q = generateQuestion(num);
  let box = document.getElementById("qbox");
  let qtext = document.getElementById("question");
  let ans = document.getElementById("answers");

  qtext.innerText = q.question;
  ans.innerHTML = "";

  q.answers.forEach((a, i) => {
    let b = document.createElement("button");
    b.type = "button";
    b.innerText = a;
    b.onclick = () => answer(i === q.correct, num);
    ans.appendChild(b);
  });

  box.style.display = "block";
}

function answer(correct, num) {
  questionOpen = false;
  document.getElementById("qbox").style.display = "none";

  if (correct) {
    players[currentPlayer] += num;
  }

  updateScores();
  nextTurn();
}

function updateScores() {
  document.getElementById("p1").innerText = players[0];
  document.getElementById("p2").innerText = players[1];
  document.getElementById("p3").innerText = players[2];
}

function finishGame() {
  stopCounter();
  counter.innerText = "KRAJ";

  let ranking = [
    { name: "Igrač 1", score: players[0] },
    { name: "Igrač 2", score: players[1] },
    { name: "Igrač 3", score: players[2] }
  ].sort((a, b) => b.score - a.score);

  setTimeout(() => {
    alert(
      "Kraj igre!\n\n" +
      "1. " + ranking[0].name + " - " + ranking[0].score + " bodova\n" +
      "2. " + ranking[1].name + " - " + ranking[1].score + " bodova\n" +
      "3. " + ranking[2].name + " - " + ranking[2].score + " bodova"
    );
  }, 100);
}

function nextTurn() {
  currentTurnIndex++;

  if (currentTurnIndex >= 3) {
    round++;
    currentTurnIndex = 0;

    if (round > 10) {
      finishGame();
      return;
    }

    drawNumbers();
  }

  setCurrentPlayer();
  currentNumber = null;
  counter.innerText = "-";
  startCounter();
}

function startGame() {
  round = 1;
  currentTurnIndex = 0;
  setCurrentPlayer();
  drawNumbers();
  updateScores();
  startCounter();
}

startGame();
</script>

</body>
</html>
