<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Kviz s 3 igrača - svi krugovi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #000;
    }

    /* 🔥 POZADINA */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("pozadina.png") center/cover no-repeat;
      filter: blur(4px);
      z-index: -1;
    }

    .counter {
      font-size: 50px;
      text-align: center;
      margin-bottom: 20px;
      border: 3px solid #333;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.9);
      font-weight: 800;
    }

    .players {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .player {
      width: 30%;
      padding: 20px;
      border: 3px solid #333;
      text-align: center;
      font-size: 22px;
      border-radius: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.9);
    }

    .active {
      background-color: #ffeeba;
      border-color: #ff8800;
    }

    .tie-target {
      border: 3px solid red !important;
      box-shadow: 0 0 10px red;
    }

    .round {
      margin-bottom: 20px;
    }

    .round-title {
      font-size: 18px;
      margin-bottom: 5px;
      font-weight: normal;
      color: #ccc;
    }

    .round-title.active-round {
      font-weight: bold;
      color: #fff;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 8px;
    }

    .number-button {
      padding: 8px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 6px;
      background-color: #eee;
      border: 1px solid #aaa;
    }

    .number-button:hover:not(.used):not(.disabled) {
      background-color: #ddd;
    }

    .used {
      opacity: 0.4;
      cursor: default;
    }

    .highlight {
      background-color: yellow !important;
      border: 2px solid red;
    }

    .zero {
      background-color: #fdd !important;
      border-color: red;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.3;
    }

    .scoreboard-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .scoreboard {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      min-width: 300px;
    }

    .winner {
      font-size: 26px;
      font-weight: bold;
      color: green;
      margin-bottom: 15px;
    }

    .score-item {
      font-size: 20px;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h1>Kviz: 3 igrača, 10 krugova</h1>

<div class="counter" id="counter">-</div>

<div class="players">
  <div class="player" id="player1" onclick="resetPlayerScore(0)">Igrač 1: <span>0</span></div>
  <div class="player" id="player2" onclick="resetPlayerScore(1)">Igrač 2: <span>0</span></div>
  <div class="player" id="player3" onclick="resetPlayerScore(2)">Igrač 3: <span>0</span></div>
</div>

<div id="allRounds"></div>

<script>
let players = [0, 0, 0];
const playerEls = [
  document.getElementById("player1"),
  document.getElementById("player2"),
  document.getElementById("player3")
];

let usedNumbers = new Set();
let round = 1;
let turnInRound = 0;
let currentTurnPattern = [];

let counterInterval = null;
let currentCounter = null;
let counterRunning = false;

let selectionLocked = false;
let autoStopInProgress = false;

const counterEl = document.getElementById("counter");

const defaultTurnPattern = [
  [0, 1, 2],
  [1, 2, 0],
  [2, 0, 1]
];

function getCurrentPlayerIndex() {
  return currentTurnPattern[turnInRound];
}

function updateTurnPattern() {
  if (round === 10) {
    let sorted = [0, 1, 2].sort((a, b) => players[a] - players[b]);
    currentTurnPattern = sorted;
  } else {
    currentTurnPattern = defaultTurnPattern[(round - 1) % 3];
  }
}

function highlightActivePlayer() {
  playerEls.forEach((el, idx) => {
    el.classList.toggle("active", idx === getCurrentPlayerIndex());
  });
}

function updatePlayerScores() {
  playerEls.forEach((el, idx) => {
    el.querySelector("span").textContent = players[idx];
  });
}

function showScoreboard() {
  let ranking = [
    {name: "Igrač 1", score: players[0]},
    {name: "Igrač 2", score: players[1]},
    {name: "Igrač 3", score: players[2]}
  ];

  ranking.sort((a, b) => b.score - a.score);

  const overlay = document.createElement("div");
  overlay.className = "scoreboard-overlay";

  const board = document.createElement("div");
  board.className = "scoreboard";

  board.innerHTML = `
    <h2>🏆 Rezultati</h2>
    <div class="winner">Pobjednik: ${ranking[0].name} (${ranking[0].score} bodova)</div>
    <div class="score-item">2. ${ranking[1].name} - ${ranking[1].score}</div>
    <div class="score-item">3. ${ranking[2].name} - ${ranking[2].score}</div>
  `;

  overlay.appendChild(board);
  document.body.appendChild(overlay);
}

function advanceTurn() {
  turnInRound++;
  if (turnInRound === 3) {
    turnInRound = 0;
    round++;
    if (round > 10) {
      showScoreboard();
      return;
    }
    updateTurnPattern();
  }

  selectionLocked = false;

  updateRoundStyles();
  highlightActivePlayer();
  checkForTieOpportunity();
  lockInactiveRoundButtons();
  startCounter();
}

function useNumber(num, btn) {
  if (btn.classList.contains('used') || btn.classList.contains('disabled')) return;

  stopCounter();

  const idx = getCurrentPlayerIndex();
  const myScore = players[idx];
  const others = players.map((score, i) => ({ index: i, score })).filter(p => p.index !== idx);
  const start = (round - 1) * 10 + 1;
  const end = round * 10;

  let tieIndex = null;
  let isTiePossible = false;

  for (let other of others) {
    let diff = other.score - myScore;
    if (diff > 0 && !usedNumbers.has(diff) && diff >= start && diff <= end) {
      tieIndex = other.index;
      isTiePossible = true;
      break;
    }
  }

  if (num === 0) {
    if (isTiePossible) {
      players[idx] = 0;
    }

    if (currentCounter !== null) {
      const numberBtn = document.getElementById("btn-" + currentCounter);
      if (numberBtn) {
        numberBtn.classList.add("used");
        numberBtn.disabled = true;
        usedNumbers.add(currentCounter);
      }
    }

  } else {
    players[idx] += num;
    usedNumbers.add(num);
    btn.classList.add("used");
    btn.disabled = true;

    if (tieIndex !== null) {
      players[tieIndex] = 0;
    }
  }

  document.querySelectorAll(".number-button").forEach(b => {
    b.classList.add("disabled");
  });

  updatePlayerScores();
  highlightActivePlayer();
  advanceTurn();
}

function checkForTieOpportunity() {
  const idx = getCurrentPlayerIndex();
  const myScore = players[idx];
  const others = players.map((score, i) => ({ index: i, score })).filter(p => p.index !== idx);

  document.querySelectorAll('.number-button').forEach(btn => btn.classList.remove('highlight'));
  playerEls.forEach(p => p.classList.remove('tie-target'));

  let start = (round - 1) * 10 + 1;
  let end = round * 10;

  for (let other of others) {
    let diff = other.score - myScore;

    if (diff > 0 && !usedNumbers.has(diff) && diff >= start && diff <= end) {
      const btn = document.getElementById("btn-" + diff);
      if (btn) btn.classList.add("highlight");
      playerEls[other.index].classList.add("tie-target");

      autoStopInProgress = true;

      setTimeout(() => {
        if (counterRunning) {
          currentCounter = diff;
          counterEl.textContent = diff;
          stopCounter();
        }
        autoStopInProgress = false;
      }, 2000);

      return;
    }
  }
}

function updateRoundStyles() {
  for (let i = 1; i <= 10; i++) {
    const title = document.getElementById("round-title-" + i);
    if (title) {
      title.classList.toggle("active-round", i === round);
    }
  }
}

function resetPlayerScore(playerIdx) {
  if (confirm("Želiš li stvarno obrisati sve bodove igraču " + (playerIdx + 1) + "?")) {
    players[playerIdx] = 0;
    updatePlayerScores();
    highlightActivePlayer();
    checkForTieOpportunity();
  }
}

function generateAllRounds() {
  const container = document.getElementById("allRounds");
  for (let r = 1; r <= 10; r++) {
    const roundDiv = document.createElement("div");
    roundDiv.className = "round";

    const roundTitle = document.createElement("div");
    roundTitle.className = "round-title";
    roundTitle.id = "round-title-" + r;
    roundTitle.textContent = `Krug ${r} (brojevi ${(r - 1) * 10 + 1} - ${r * 10})`;

    roundDiv.appendChild(roundTitle);

    const numbersDiv = document.createElement("div");
    numbersDiv.className = "numbers";

    for (let i = (r - 1) * 10 + 1; i <= r * 10; i++) {
      const btn = document.createElement("button");
      btn.textContent = i;
      btn.className = "number-button";
      btn.id = "btn-" + i;
      btn.onclick = () => useNumber(i, btn);
      numbersDiv.appendChild(btn);
    }

    const zeroBtn = document.createElement("button");
    zeroBtn.textContent = "0";
    zeroBtn.className = "number-button zero";
    zeroBtn.onclick = () => useNumber(0, zeroBtn);

    numbersDiv.appendChild(zeroBtn);
    roundDiv.appendChild(numbersDiv);
    container.appendChild(roundDiv);
  }

  updateRoundStyles();
  highlightActivePlayer();
  lockInactiveRoundButtons();
}

function lockInactiveRoundButtons() {
  for (let r = 1; r <= 10; r++) {
    const isActive = r === round;
    for (let i = (r - 1) * 10 + 1; i <= r * 10; i++) {
      const btn = document.getElementById("btn-" + i);
      if (btn && !btn.classList.contains('used')) {
        btn.classList.toggle("disabled", !isActive);
      }
    }
  }
}

function lockAllowedNumbers() {
  document.querySelectorAll(".number-button").forEach(btn => {
    if (!btn.classList.contains("used")) {
      btn.classList.add("disabled");
    }
  });

  if (currentCounter !== null) {
    const btn = document.getElementById("btn-" + currentCounter);
    if (btn) btn.classList.remove("disabled");
  }

  document.querySelectorAll(".zero").forEach(btn => {
    btn.classList.remove("disabled");
  });
}

function getAvailableNumbers() {
  let start = (round - 1) * 10 + 1;
  let end = round * 10;
  let nums = [];

  for (let i = start; i <= end; i++) {
    if (!usedNumbers.has(i)) nums.push(i);
  }
  return nums;
}

function startCounter() {
  stopCounter();
  counterRunning = true;

  counterInterval = setInterval(() => {
    let nums = getAvailableNumbers();
    if (nums.length === 0) return;

    let rand = nums[Math.floor(Math.random() * nums.length)];
    currentCounter = rand;
    counterEl.textContent = rand;

  }, 50);
}

function stopCounter() {
  counterRunning = false;
  clearInterval(counterInterval);

  lockAllowedNumbers();
}

counterEl.addEventListener("click", () => {
  if (counterRunning && !autoStopInProgress) {
    stopCounter();
  }
});

updateTurnPattern();
generateAllRounds();
updatePlayerScores();
startCounter();
</script>

</body>
</html>
