<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz igra</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
}

.game {
  position:relative;
  width:100%;
  height:100vh;
  background:url("pozadina.png") center/cover no-repeat;
}

/* GORNJI BROJEVI */
.round-numbers {
  position:absolute;
  top:3%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

.round-numbers button {
  padding:10px;
  font-size:18px;
}

/* COUNTER */
.counter {
  position:absolute;
  top:30%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  background:red;
  padding:20px 40px;
  cursor:pointer;
}

/* IGRAČI */
.player {
  position:absolute;
  bottom:28%;
  font-size:30px;
  background:red;
  padding:10px 20px;
}

#p1 { left:15%; }
#p2 { left:45%; }
#p3 { right:15%; }

/* PITANJE */
.question-box {
  position:absolute;
  bottom:0;
  width:100%;
  background:red;
  padding:30px;
  text-align:center;
}

.answers {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.answers button {
  padding:15px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="game">

  <div class="round-numbers" id="numbers"></div>

  <div class="counter" id="counter">-</div>

  <div id="p1" class="player">0</div>
  <div id="p2" class="player">0</div>
  <div id="p3" class="player">0</div>

  <div class="question-box" id="qbox" style="display:none;">
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
  </div>

</div>

<script>
let players=[0,0,0];
let round=1;
let used=new Set();
let currentNumber=null;
let currentPlayer=0;
let running=true;

const counter=document.getElementById("counter");

/* PITANJA GENERATOR */
function generateQuestion(n){
  let a=Math.floor(Math.random()*n);
  return {
    question:`Koliko je ${a} + ${n-a}?`,
    answers:[
      a+(n-a),
      a+(n-a)+1,
      a+(n-a)-1,
      a+(n-a)+2
    ],
    correct:0
  }
}

/* BROJEVI */
function drawNumbers(){
  let div=document.getElementById("numbers");
  div.innerHTML="";
  let start=(round-1)*10+1;
  let end=round*10;

  for(let i=start;i<=end;i++){
    if(!used.has(i)){
      let b=document.createElement("button");
      b.innerText=i;
      b.onclick=()=>startQuestion(i);
      div.appendChild(b);
    }
  }
}

/* COUNTER */
let interval;
function startCounter(){
  running=true;
  interval=setInterval(()=>{
    let nums=[...document.querySelectorAll("#numbers button")].map(b=>+b.innerText);
    if(nums.length===0)return;
    let r=nums[Math.floor(Math.random()*nums.length)];
    currentNumber=r;
    counter.innerText=r;
  },50);
}

counter.onclick=()=>{
  if(running){
    clearInterval(interval);
    running=false;
    startQuestion(currentNumber);
  }
};

/* PITANJE */
function startQuestion(num){
  used.add(num);

  let q=generateQuestion(num);
  let box=document.getElementById("qbox");
  let qtext=document.getElementById("question");
  let ans=document.getElementById("answers");

  qtext.innerText=q.question;
  ans.innerHTML="";

  q.answers.forEach((a,i)=>{
    let b=document.createElement("button");
    b.innerText=a;
    b.onclick=()=>answer(i===q.correct,num);
    ans.appendChild(b);
  });

  box.style.display="block";

  /* BOT */
  if(currentPlayer!==0){
    setTimeout(()=>{
      let correct=Math.random()<0.7;
      answer(correct,num);
    },1500);
  }
}

/* ODGOVOR */
function answer(correct,num){
  document.getElementById("qbox").style.display="none";

  if(correct){
    players[currentPlayer]+=num;
  }

  updateScores();
  nextTurn();
}

/* SCORE */
function updateScores(){
  document.getElementById("p1").innerText=players[0];
  document.getElementById("p2").innerText=players[1];
  document.getElementById("p3").innerText=players[2];
}

/* TURN */
function nextTurn(){
  currentPlayer=(currentPlayer+1)%3;

  if(currentPlayer===0){
    startCounter();
  }else{
    startQuestion(currentNumber);
  }
}

/* START */
drawNumbers();
startCounter();
</script>

</body>
</html>
