<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.game {
  position: relative;
  width: min(100vw, calc(100dvh * 9 / 16));
  height: min(100dvh, calc(100vw * 16 / 9));
  aspect-ratio: 9 / 16;
  background: url("pozadina.png") center/100% 100% no-repeat;
  overflow: hidden;
}

/* GORNJI BROJEVI */
.round-numbers {
  position: absolute;
  top: 6.8%;
  left: 50%;
  transform: translateX(-50%);
  width: 76%;
  display: flex;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0.7%;
  overflow: hidden;
}

.round-numbers button {
  aspect-ratio: 1 / 1;
  flex: 1 1 auto;
  max-width: 9%;
  padding: 0;
  font-size: clamp(14px, 2vw, 20px);
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: white;
  border: 1.5px solid white;
  border-radius: 6px;
  box-sizing: border-box;
}

.round-numbers button.used-number {
  opacity: 0.35;
}

/* COUNTER */
.counter {
  position: absolute;
  top: 31.2%;
  left: 50%;
  transform: translate(-50%, -50%);
  min-width: 20%;
  min-height: 6.2%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(42px, 6.5vw, 78px);
  font-weight: 900;
  color: white;
  line-height: 1;
  padding: 1.2% 2.5%;
  cursor: pointer;
  text-shadow:
    0 0 8px rgba(255,255,255,0.95),
    0 0 18px rgba(80,160,255,0.95),
    0 0 34px rgba(30,94,255,1);
}

.counter.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ATTACK TEXT */
.attack-text {
  position: absolute;
  top: 31.2%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.4);
  font-size: clamp(34px, 6vw, 70px);
  font-weight: 900;
  color: #ffffff;
  opacity: 0;
  pointer-events: none;
  text-shadow:
    0 0 10px rgba(255,255,255,0.95),
    0 0 20px rgba(255,80,80,0.95),
    0 0 36px rgba(255,0,0,0.95);
}

.attack-text.show {
  animation: attackZoom 2.6s ease forwards;
}

@keyframes attackZoom {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.4);
  }
  15% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.15);
  }
  75% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.55);
  }
}

/* ATTACK NUMBER */
.attack-number {
  position: absolute;
  top: 31.2%;
  left: 50%;
  transform: translate(-50%, -50%);
  min-width: 20%;
  min-height: 6.2%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(42px, 6.5vw, 78px);
  font-weight: 900;
  color: #ffe66a;
  line-height: 1;
  padding: 1.2% 2.5%;
  opacity: 0;
  pointer-events: none;
  text-shadow:
    0 0 5px rgba(255,240,170,0.75),
    0 0 12px rgba(255,220,80,0.7),
    0 0 22px rgba(255,190,0,0.7);
}

.attack-number.show {
  opacity: 1;
}

/* IGRAČI */
.player {
  position: absolute;
  top: 53.8%;
  transform: translateX(-50%);
  min-width: 19%;
  min-height: 4.4%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 3.1vw, 30px);
  font-weight: bold;
  background: #1e5eff;
  border: 2px solid white;
  border-radius: 10px;
  padding: 0.8% 1.5%;
  box-shadow:
    0 0 6px rgba(255,255,255,0.55),
    0 0 16px rgba(30,94,255,0.9);
}

.player.active-player {
  background: #63a0ff;
}

.player.attack-target {
  animation: attackPulse 0.75s ease-in-out infinite;
}

.player.lose-zoom {
  animation: loseZoom 1s ease-in-out forwards;
  z-index: 8;
}

.player.gain-zoom {
  animation: gainZoom 1s ease-in-out forwards;
  z-index: 8;
}

@keyframes attackPulse {
  0% {
    box-shadow:
      0 0 8px rgba(255,255,255,0.55),
      0 0 16px rgba(30,94,255,0.9);
  }
  50% {
    box-shadow:
      0 0 10px rgba(255,255,255,0.85),
      0 0 18px rgba(255,80,80,0.95),
      0 0 30px rgba(255,0,0,0.9);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255,255,255,0.55),
      0 0 16px rgba(30,94,255,0.9);
  }
}

@keyframes loseZoom {
  0% {
    transform: translateX(-50%) scale(1);
  }
  35% {
    transform: translateX(-50%) scale(1.18);
  }
  100% {
    transform: translateX(-50%) scale(1);
  }
}

@keyframes gainZoom {
  0% {
    transform: translateX(-50%) scale(1);
  }
  35% {
    transform: translateX(-50%) scale(1.18);
  }
  100% {
    transform: translateX(-50%) scale(1);
  }
}

/* mali pomaci */
#p1 { left: 21.6%; }
#p2 { left: 50%; }
#p3 { left: 78.4%; }

/* PITANJE */
.question-box {

  left: 0;
  bottom: 0;
  width: 100%;

  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 39%;
  max-height: 39%;
  overflow: hidden;

/* ODGOVORI */
.answers {

  margin-top: auto;
  flex-shrink: 0;

.answers button {

  word-break: break-word;

  border: 2px solid white;

    inset 0 2px 8px rgba(255,255,255,0.10),

  transition: background-color 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
}

.answers button.pressed {
  background: rgba(127, 176, 255, 0.28);
  box-shadow:

.answers button.correct-answer {

  color: #ffffff;

    0 4px 10px rgba(0,0,0,0.24),

</style>
</head>

function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function prepareGameQuestions() {
  gameQuestions = shuffleArray(questionBank);
  questionIndex = 0;
}

function getNextQuestion() {
  if (questionIndex >= gameQuestions.length) {
    gameQuestions = shuffleArray(questionBank);
    questionIndex = 0;
  }

  const base = gameQuestions[questionIndex++];
  const answers = base.answers.map((text, index) => ({
    text,
    isCorrect: index === 0
  }));

  const shuffledAnswers = shuffleArray(answers);
  const correctIndex = shuffledAnswers.findIndex(a => a.isCorrect);

  return {
    question: base.question,
    answers: shuffledAnswers.map(a => a.text),
    correct: correctIndex
  };
}

function fitQuestionText() {
  const qtext = document.getElementById("question");
  const box = document.getElementById("qbox");
  const answers = document.getElementById("answers");

  let fontSize = 30;
  const minFont = 11;

  qtext.style.fontSize = fontSize + "px";

  requestAnimationFrame(() => {
    const boxHeight = box.clientHeight;
    const answersHeight = answers.scrollHeight;
    const availableHeight = Math.max(40, boxHeight - answersHeight - 26);

    qtext.style.minHeight = availableHeight + "px";
    qtext.style.maxHeight = availableHeight + "px";

    while ((qtext.scrollHeight > availableHeight || qtext.scrollWidth > qtext.clientWidth) && fontSize > minFont) {
      fontSize -= 1;
      qtext.style.fontSize = fontSize + "px";
    }
  });
}

function getRoundRange() {
  return {
    start: (round - 1) * 10 + 1,
    end: round * 10
  };
}

function getTurnOrder() {
  if (round < 10) return baseTurnPatterns[(round - 1) % 3];
  return round10Order;
}

function updatePlayerEffects() {
  playerEls.forEach((el, index) => {
    el.classList.toggle("active-player", index === currentPlayer);
    el.classList.toggle("attack-target", index === attackTarget);
  });
}

function setCurrentPlayer() {
  currentPlayer = getTurnOrder()[currentTurnIndex];
  updatePlayerEffects();
}

function drawNumbers() {
  let div = document.getElementById("numbers");
  div.innerHTML = "";

  let { start, end } = getRoundRange();

  for (let i = start; i <= end; i++) {
    let b = document.createElement("button");
    b.innerText = i;
    b.type = "button";
    b.disabled = true;

    if (used.has(i)) b.classList.add("used-number");

    div.appendChild(b);
  }
}

function getAvailableNumbers() {
  let { start, end } = getRoundRange();
  let nums = [];

  for (let i = start; i <= end; i++) {
    if (!used.has(i)) nums.push(i);
  }

  return nums;
}

function findAttackNumber() {
  let available = getAvailableNumbers();
  let myScore = players[currentPlayer];

  for (let i = 0; i < 3; i++) {
    if (i === currentPlayer) continue;

    let diff = players[i] - myScore;
    if (diff > 0 && available.includes(diff)) {
      return { number: diff, target: i };
    }
  }

  return null;
}

let interval;

function stopCounter() {
  running = false;
  clearInterval(interval);
}

function hideAttackVisuals() {
  attackTextEl.classList.remove("show");
  attackNumberEl.classList.remove("show");
  attackNumberEl.textContent = "";
  counter.classList.remove("hidden");
}

function startAttackSequence(number) {
  counter.classList.add("hidden");
  attackNumberEl.classList.remove("show");
  attackNumberEl.textContent = "";
  attackTextEl.classList.remove("show");
  void attackTextEl.offsetWidth;
  attackTextEl.classList.add("show");

  setTimeout(() => {
    attackNumberEl.textContent = number;
    attackNumberEl.classList.add("show");
  }, 2600);

  setTimeout(() => {
    startQuestion(number);
  }, 3600);
}

function startCounter() {
  stopCounter();
  hideAttackVisuals();

  let attack = findAttackNumber();

  if (attack) {
    attackTarget = attack.target;
    updatePlayerEffects();
    currentNumber = attack.number;
    startAttackSequence(currentNumber);
    return;
  }

  attackTarget = null;
  updatePlayerEffects();

  let nums = getAvailableNumbers();
  if (nums.length === 0) return;

  running = true;

  interval = setInterval(() => {
    let available = getAvailableNumbers();
    if (available.length === 0) {
      stopCounter();
      return;
    }

    let r = available[Math.floor(Math.random() * available.length)];
    currentNumber = r;
    counter.innerText = r;
  }, 50);
}

counter.onclick = () => {
  if (!running || questionOpen) return;
  if (currentNumber === null) return;

  stopCounter();
  startQuestion(currentNumber);
};

function startQuestion(num) {
  if (questionOpen) return;

  used.add(num);
  drawNumbers();
  questionOpen = true;
  selectedAnswerLocked = false;

  const q = getNextQuestion();
  let box = document.getElementById("qbox");
  let qtext = document.getElementById("question");
  let ans = document.getElementById("answers");

  qtext.innerText = q.question;
  ans.innerHTML = "";

  q.answers.forEach((a, i) => {
    let b = document.createElement("button");
    b.type = "button";
    b.innerText = a;

    b.addEventListener("pointerdown", () => {
      if (!selectedAnswerLocked) b.classList.add("pressed");
    });

    const clearPressed = () => b.classList.remove("pressed");
    b.addEventListener("pointerup", clearPressed);
    b.addEventListener("pointerleave", clearPressed);
    b.addEventListener("pointercancel", clearPressed);
    b.addEventListener("mouseup", clearPressed);
    b.addEventListener("mouseleave", clearPressed);
    b.addEventListener("touchend", clearPressed);

    b.onclick = () => handleAnswerSelection(i, q.correct, num);
    ans.appendChild(b);
  });

  box.style.display = "flex";
  fitQuestionText();
}

function handleAnswerSelection(selectedIndex, correctIndex, num) {
  if (selectedAnswerLocked) return;
  selectedAnswerLocked = true;

  const buttons = [...document.querySelectorAll("#answers button")];
  buttons.forEach(btn => {
    btn.disabled = true;
    btn.classList.remove("pressed");
  });

  const isCorrect = selectedIndex === correctIndex;

  if (isCorrect) {
    buttons[selectedIndex].classList.add("correct-answer");
  } else {
    buttons[selectedIndex].classList.add("wrong-answer");
    buttons[correctIndex].classList.add("reveal-answer");
  }

  setTimeout(() => {
    answer(isCorrect, num);
  }, 1000);
}

function animateScoreLoss(playerIndex, fromValue, done) {
  const el = playerEls[playerIndex];

  if (fromValue <= 0) {
    el.innerText = 0;
    done();
    return;
  }

  el.classList.add("lose-zoom");

  const duration = 900;
  const stepTime = 50;
  const steps = Math.max(1, Math.floor(duration / stepTime));
  let step = 0;

  const tick = setInterval(() => {
    step++;
    const remaining = Math.max(0, Math.round(fromValue * (1 - step / steps)));
    el.innerText = remaining;

    if (step >= steps) {
      clearInterval(tick);
      el.innerText = 0;

      setTimeout(() => {
        el.classList.remove("lose-zoom");
        done();
      }, 180);
    }
  }, stepTime);
}

function animateScoreGain(playerIndex, fromValue, toValue, done) {
  const el = playerEls[playerIndex];

  if (toValue <= fromValue) {
    el.innerText = toValue;
    done();
    return;
  }

  el.classList.add("gain-zoom");

  const duration = 900;
  const stepTime = 50;
  const steps = Math.max(1, Math.floor(duration / stepTime));
  let step = 0;

  const tick = setInterval(() => {
    step++;
    const gained = Math.round(fromValue + ((toValue - fromValue) * step / steps));
    el.innerText = Math.min(toValue, gained);

    if (step >= steps) {
      clearInterval(tick);
      el.innerText = toValue;

      setTimeout(() => {
        el.classList.remove("gain-zoom");
        done();
      }, 180);
    }
  }, stepTime);
}

function answer(correct, num) {
  questionOpen = false;
  selectedAnswerLocked = false;
  document.getElementById("qbox").style.display = "none";

  if (attackTarget !== null) {
    if (correct) {
      const targetIndex = attackTarget;
      const attackerIndex = currentPlayer;
      const oldTargetScore = players[targetIndex];
      const oldAttackerScore = players[attackerIndex];
      const newAttackerScore = oldAttackerScore + num;

      players[targetIndex] = 0;
      players[attackerIndex] = newAttackerScore;

      playerEls[targetIndex].innerText = oldTargetScore;
      playerEls[attackerIndex].innerText = oldAttackerScore;

      animateScoreLoss(targetIndex, oldTargetScore, () => {
        attackTarget = null;
        updatePlayerEffects();
        animateScoreGain(attackerIndex, oldAttackerScore, newAttackerScore, () => {
          updateScores();
          nextTurn();
        });
      });
    } else {
      const loserIndex = currentPlayer;
      const oldLoserScore = players[loserIndex];

      players[currentPlayer] = 0;
      playerEls[loserIndex].innerText = oldLoserScore;

      animateScoreLoss(loserIndex, oldLoserScore, () => {
        attackTarget = null;
        updatePlayerEffects();
        updateScores();
        nextTurn();
      });
    }
  } else {
    if (correct) {
      const winnerIndex = currentPlayer;
      const oldWinnerScore = players[winnerIndex];
      const newWinnerScore = oldWinnerScore + num;

      players[winnerIndex] = newWinnerScore;
      playerEls[winnerIndex].innerText = oldWinnerScore;

      animateScoreGain(winnerIndex, oldWinnerScore, newWinnerScore, () => {
        attackTarget = null;
        updatePlayerEffects();
        updateScores();
        nextTurn();
      });
      return;
    }

    attackTarget = null;
    updatePlayerEffects();
    updateScores();
    nextTurn();
  }
}

function updateScores() {
  document.getElementById("p1").innerText = players[0];
  document.getElementById("p2").innerText = players[1];
  document.getElementById("p3").innerText = players[2];
}

function finishGame() {
  stopCounter();
  hideAttackVisuals();
  counter.innerText = "KRAJ";

  let ranking = [
    { name: "Igrač 1", score: players[0] },
    { name: "Igrač 2", score: players[1] },
    { name: "Igrač 3", score: players[2] }
  ].sort((a, b) => b.score - a.score);

  setTimeout(() => {
    alert(
      "Kraj igre!\n\n" +
      "1. " + ranking[0].name + " - " + ranking[0].score + " bodova\n" +
      "2. " + ranking[1].name + " - " + ranking[1].score + " bodova\n" +
      "3. " + ranking[2].name + " - " + ranking[2].score + " bodova"
    );
  }, 100);
}

function nextTurn() {
  currentTurnIndex++;

  if (currentTurnIndex >= 3) {

    if (round === 9) {
      round10Order = [0, 1, 2]
        .map(index => ({ index, score: players[index] }))
        .sort((a, b) => a.score - b.score)
        .map(item => item.index);
    }

    round++;
    currentTurnIndex = 0;

    if (round > 10) {
      finishGame();
      return;
    }

    drawNumbers();
  }

  setCurrentPlayer();
  currentNumber = null;
  counter.innerText = "-";
  startCounter();
}

function startGame() {
  round = 1;
  currentTurnIndex = 0;
  round10Order = null;
  attackTarget = null;
  prepareGameQuestions();
  setCurrentPlayer();
  drawNumbers();
  updateScores();
  startCounter();
}

startGame();
