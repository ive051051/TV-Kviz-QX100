<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kviz igra</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.game {
  position: relative;
  width: min(100vw, calc(100dvh * 9 / 16));
  height: min(100dvh, calc(100vw * 16 / 9));
  aspect-ratio: 9 / 16;
  background: url("pozadina.png") center/100% 100% no-repeat;
  overflow: hidden;
}

/* GORNJI BROJEVI */
.round-numbers {
  position: absolute;
  top: 6.8%;
  left: 50%;
  transform: translateX(-50%);
  width: 76%;
  display: flex;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 0.7%;
  overflow: hidden;
}

.round-numbers button {
  padding: 0.6em 0.55em;
  font-size: clamp(12px, 1.7vw, 18px);
  white-space: nowrap;
  flex: 1 1 auto;
  max-width: 9%;
  border-radius: 10px;
  background: #1e5eff;
  color: white;
  border: 2px solid white;
}

/* COUNTER */
.counter {
  position: absolute;
  top: 31.2%;
  left: 50%;
  transform: translate(-50%, -50%);
  min-width: 20%;
  min-height: 6.2%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(32px, 5vw, 60px);
  font-weight: 900;
  background: #1e5eff;
  border: 3px solid white;
  border-radius: 12px;
  padding: 1.2% 2.5%;
  cursor: pointer;
}

/* IGRAČI */
.player {
  position: absolute;
  top: 53.8%;
  transform: translateX(-50%);
  min-width: 19%;
  min-height: 4.4%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 3.1vw, 30px);
  font-weight: bold;
  background: #1e5eff;
  border: 2px solid white;
  border-radius: 10px;
  padding: 0.8% 1.5%;
}

/* mali pomaci */
#p1 { left: 18.8%; }
#p2 { left: 50%; }
#p3 { left: 81.2%; }

/* PITANJE */
.question-box {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 25.2%;
  box-sizing: border-box;
  background: rgba(30, 94, 255, 0.85);
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  padding: 3.2% 4% 3.5%;
  text-align: center;
}

/* PITANJE TEXT */
.question-box h2 {
  margin: 0 0 3.2% 0;
  font-size: clamp(24px, 4.2vw, 42px);
  color: white;
}

/* ODGOVORI */
.answers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8% 14%;
  margin-top: 1%;
}

.answers button {
  padding: 0.9em 0.6em;
  font-size: clamp(15px, 2.2vw, 18px);
  background: #1e5eff;
  color: white;
  border: 2px solid white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="game">

  <div class="round-numbers" id="numbers"></div>

  <div class="counter" id="counter">-</div>

  <div id="p1" class="player">0</div>
  <div id="p2" class="player">0</div>
  <div id="p3" class="player">0</div>

  <div class="question-box" id="qbox" style="display:none;">
    <h2 id="question"></h2>
    <div class="answers" id="answers"></div>
  </div>

</div>

<script>
let players=[0,0,0];
let round=1;
let used=new Set();
let currentNumber=null;
let currentPlayer=0;
let running=true;

const counter=document.getElementById("counter");

/* PITANJA GENERATOR */
function generateQuestion(n){
  let a=Math.floor(Math.random()*n);
  return {
    question:`Koliko je ${a} + ${n-a}?`,
    answers:[
      a+(n-a),
      a+(n-a)+1,
      a+(n-a)-1,
      a+(n-a)+2
    ],
    correct:0
  }
}

/* BROJEVI */
function drawNumbers(){
  let div=document.getElementById("numbers");
  div.innerHTML="";
  let start=(round-1)*10+1;
  let end=round*10;

  for(let i=start;i<=end;i++){
    if(!used.has(i)){
      let b=document.createElement("button");
      b.innerText=i;
      b.onclick=()=>startQuestion(i);
      div.appendChild(b);
    }
  }
}

/* COUNTER */
let interval;
function startCounter(){
  running=true;
  interval=setInterval(()=>{
    let nums=[...document.querySelectorAll("#numbers button")].map(b=>+b.innerText);
    if(nums.length===0)return;
    let r=nums[Math.floor(Math.random()*nums.length)];
    currentNumber=r;
    counter.innerText=r;
  },50);
}

counter.onclick=()=>{
  if(running){
    clearInterval(interval);
    running=false;
    startQuestion(currentNumber);
  }
};

/* PITANJE */
function startQuestion(num){
  used.add(num);

  let q=generateQuestion(num);
  let box=document.getElementById("qbox");
  let qtext=document.getElementById("question");
  let ans=document.getElementById("answers");

  qtext.innerText=q.question;
  ans.innerHTML="";

  q.answers.forEach((a,i)=>{
    let b=document.createElement("button");
    b.innerText=a;
    b.onclick=()=>answer(i===q.correct,num);
    ans.appendChild(b);
  });

  box.style.display="block";

  /* BOT */
  if(currentPlayer!==0){
    setTimeout(()=>{
      let correct=Math.random()<0.7;
      answer(correct,num);
    },1500);
  }
}

/* ODGOVOR */
function answer(correct,num){
  document.getElementById("qbox").style.display="none";

  if(correct){
    players[currentPlayer]+=num;
  }

  updateScores();
  nextTurn();
}

/* SCORE */
function updateScores(){
  document.getElementById("p1").innerText=players[0];
  document.getElementById("p2").innerText=players[1];
  document.getElementById("p3").innerText=players[2];
}

/* TURN */
function nextTurn(){
  currentPlayer=(currentPlayer+1)%3;

  if(currentPlayer===0){
    startCounter();
  }else{
    startQuestion(currentNumber);
  }
}

/* START */
drawNumbers();
startCounter();
</script>

</body>
</html>

</body>
</html>
